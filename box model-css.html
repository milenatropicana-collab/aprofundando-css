<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box model css</title>
</head>
<body>
  <main>
    <style>
      *{
        padding:0%;
        margin: 0%;
        border-sizing:border-box;
      }
    </style>
    <style>
      div{
        border:solid 2px;
        color: black;
        padding: 1rem;
        height: 20rem;
      }
    </style>
    <div>
    <h1>
      Box model Css
    </h1>
    <h2>
      Resumo
    </h2>
    <p>The CSS box model is a fundamental concept where every HTML element is represented as a rectangular box, with four distinct areas that determine its final size and position on a webpage: content, padding, border, and margin.
</p>
</div>
  </main>
</body>
</html>
